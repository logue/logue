name: LAPRAS Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

# Grant GITHUB_TOKEN write access to repository contents so actions that update files can push
permissions:
  contents: write

jobs:
  update-card:
    name: LAPRAS Card
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate/Update LAPRAS card
        uses: kawamataryo/lapras-card-readme@main
        with:
          SHARE_ID: logue
          ICON_FIRST: "#8c9eff"
          ICON_SECOND: "#76ff03"
          BACKGROUND_FIRST: "#212529"
          BACKGROUND_SECOND: "#adb5bd"
          LANG: "en"
          # CARD_WIDTH: "400"
          # UPDATE_TIME: "true"
          # README_FILE: "README.md"
          # IS_CENTER: "true"
          # ALTERNATIVE_TEXT: "Score of {SHARE_ID} on LAPRAS"
